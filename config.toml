[intelligence]
# Market intelligence via OpenAI GPT-4o-mini + Nous Hermes (OpenRouter)
# Requires OPENAI_API_KEY and/or OPENROUTER_API_KEY in .env
# score_weight: how many min_buy_score points one intelligence point adjusts the gate
#   e.g. score=+3 and weight=2 → gate lowered by 6 points (easier to buy in bull markets)
refresh_seconds = 600
score_weight    = 2.0

[optimizer]
# Scientific method parameter optimizer
# Changes one parameter at a time, measures Sharpe delta, keeps or reverts
# Success: Sharpe >= 3.0  |  Failure: Sharpe < 1.0
enabled            = true
eval_every_n_trades = 10    # run after every N closed trades