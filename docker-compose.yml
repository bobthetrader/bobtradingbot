services:
  postgres:
    image: postgres:16
    container_name: tradingbot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tradingbot
      POSTGRES_PASSWORD: TradingBot2026
      POSTGRES_DB: tradingbot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradingbot -d tradingbot"]
      interval: 5s
      timeout: 5s
      retries: 10

  tradingbot:
    build: .
    container_name: tradingbot_local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      BOT_ARGS: "--paper"
      DATABASE_URL: "postgresql://tradingbot:TradingBot2026@postgres:5432/tradingbot"
    volumes:
      - tradingbot_data:/app/data
    ports:
      - "8080:8080"

volumes:
  tradingbot_data:
  postgres_data:
