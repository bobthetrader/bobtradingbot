# Paper trading — tightened for quality over quantity
# Balance: 500 EUR | Goal: +3-8% per month | R:R = 2.5:1
[kraken_api]
key = ""
secret = ""

[bot_settings]
base_currency = "EUR"
auto_select_pair = true
loop_interval_seconds = 60
trade_pairs = [ "XXBTZEUR", "XETHZEUR", "SOLEUR", "XXRPZEUR", "ADAEUR", "DOTEUR", "LINKEUR",]
allocation_per_trade_percent = 5.0

[risk_management]
max_drawdown_percent = 25.0
stop_loss_percent = 1.5              # Wider SL — volatile market needs more room
allocation_per_trade_percent = 5.0  # 5% = ~5 EUR per trade, 4 positions max
min_trade_eur = 4.0
min_auto_scale_notional = 0.1
min_buy_score = 10.0                 # Needs strong RSI or trend signal
take_profit_percent = 2.0            # 2.0% TP vs 0.8% SL = 2.5:1 ratio
min_net_sell_profit_pct = 0.5
enable_trading_hours = false
enable_regime_filter = false
enable_volume_filter = false
enable_daily_drawdown = false
enable_bear_shield = false
enable_atr_dynamic_tp = false
enable_mean_reversion_signals = true
mr_rsi_oversold_threshold = 30       # Only buy genuine oversold (RSI < 30)
mr_rsi_overbought_threshold = 70     # Only sell genuine overbought (RSI > 70)
break_even_trigger_percent = 1.0     # Move SL to entry only after +1.0% gain
max_consecutive_losses = 5
pause_after_loss_streak_minutes = 0
max_open_positions = 3

[intelligence]
refresh_seconds = 600
score_weight = 0.5

[execution]
signal_refresh_interval_seconds = 300   # 5 min — let signals develop
regime_cache_ttl_seconds = 300

[technical]
enable_ema_crossover_filter = false
enable_mtf_macd_filter = false
ema_fast_period = 9
ema_slow_period = 21

[optimizer]
enabled = true
eval_every_n_trades = 10

[logging]
log_level = "INFO"
log_to_file = true
log_file_path = "data/bot_activity_paper.log"

[backtesting]
historical_data_path = "data/historical_prices.csv"
results_output_path = "backtest_results/"

[reporting]
generate_trade_reports = true
report_output_path = "reports/"
cashflow_refresh_seconds = 600

[paths]
nas_root = "/mnt/fritz_nas/Volume/kraken"

[telegram]
bot_token = ""
chat_id = ""

[bot_settings.trade_amounts]
trade_amount_eur = 25.0
initial_balance = 500.0

[shorting]
enabled = true
leverage = "2"
max_short_notional_eur = 30.0
short_take_profit_percent = 1.1
short_stop_loss_percent = 0.5
