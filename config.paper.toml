# Paper canary config — tuned for active trading
[kraken_api]
key = ""
secret = ""

[bot_settings]
base_currency = "EUR"
auto_select_pair = true
loop_interval_seconds = 60
trade_pairs = [ "XXBTZEUR", "XETHZEUR", "SOLEUR", "XXRPZEUR",]
allocation_per_trade_percent = 10.0

[risk_management]
max_drawdown_percent = 10.0
stop_loss_percent = 2.0
allocation_per_trade_percent = 10.0
min_trade_eur = 5.0
min_buy_score = -100.0               # TEMP: force trade on next loop
enable_trading_hours = false
mr_rsi_oversold_threshold = 28       # more sensitive oversold detection
mr_rsi_overbought_threshold = 65     # was 55 — 55 triggered SELL too easily

[intelligence]
refresh_seconds = 600
score_weight = 0.5                   # was 2.0 — AI panel was adding +6 to the gate

[execution]
signal_refresh_interval_seconds = 300
regime_cache_ttl_seconds = 600

[technical]
enable_ema_crossover_filter = false  # was blocking almost every buy
ema_fast_period = 9
ema_slow_period = 21

[logging]
log_level = "INFO"
log_to_file = true
log_file_path = "data/bot_activity_paper.log"

[backtesting]
historical_data_path = "data/historical_prices.csv"
results_output_path = "backtest_results/"

[reporting]
generate_trade_reports = true
report_output_path = "reports/"

[paths]
nas_root = "/mnt/fritz_nas/Volume/kraken"

[telegram]
bot_token = ""
chat_id = ""

[bot_settings.trade_amounts]
trade_amount_eur = 10.0
initial_balance = 100.0

[shorting]
enabled = true
leverage = "2"
max_short_notional_eur = 25.0
short_take_profit_percent = 0.1      # TEMP: close shorts almost immediately
short_stop_loss_percent = 3.0
