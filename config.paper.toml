# Paper config — high frequency learning mode
# Goal: generate lots of trades quickly so optimizer and AI can learn
# Accept small losses — the optimizer will correct over time
[kraken_api]
key = ""
secret = ""

[bot_settings]
base_currency = "EUR"
auto_select_pair = true
loop_interval_seconds = 30
trade_pairs = [ "XXBTZEUR", "XETHZEUR", "SOLEUR", "XXRPZEUR",]
allocation_per_trade_percent = 15.0

[risk_management]
max_drawdown_percent = 15.0
stop_loss_percent = 1.5              # Cut losses fast — 1.5% and out
allocation_per_trade_percent = 15.0  # 15% per trade — enough to see real P&L movement
min_trade_eur = 5.0
min_buy_score = 0.01                  # Very low — almost any signal fires
take_profit_percent = 0.8            # Quick profits — 0.8% and close
min_net_sell_profit_pct = 0.0        # Sell at any net level — don't block exits
enable_trading_hours = false
enable_regime_filter = false
enable_volume_filter = false
enable_daily_drawdown = false
enable_bear_shield = false
enable_atr_dynamic_tp = false
enable_mean_reversion_signals = false         # use fixed 0.8% TP not ATR-inflated target
min_auto_scale_notional = 0.1
mr_rsi_oversold_threshold = 45
mr_rsi_overbought_threshold = 55
max_consecutive_losses = 10
max_open_positions = 20
pause_after_loss_streak_minutes = 0

[intelligence]
refresh_seconds = 600
score_weight = 0.3                   # Reduce AI influence so signals fire more freely

[execution]
signal_refresh_interval_seconds = 60  # Refresh signals every 60s (was 300s)
regime_cache_ttl_seconds = 120

[technical]
enable_ema_crossover_filter = false
enable_mtf_macd_filter = false
ema_fast_period = 9
ema_slow_period = 21

[optimizer]
enabled = true
eval_every_n_trades = 5              # Run optimizer every 5 trades (was 10 — quicker learning)

[logging]
log_level = "INFO"
log_to_file = true
log_file_path = "data/bot_activity_paper.log"

[backtesting]
historical_data_path = "data/historical_prices.csv"
results_output_path = "backtest_results/"

[reporting]
generate_trade_reports = true
report_output_path = "reports/"

[paths]
nas_root = "/mnt/fritz_nas/Volume/kraken"

[telegram]
bot_token = ""
chat_id = ""

[bot_settings.trade_amounts]
trade_amount_eur = 15.0
initial_balance = 100.0

[shorting]
enabled = true
leverage = "2"
max_short_notional_eur = 15.0
short_take_profit_percent = 0.8      # Match long TP — quick closes
short_stop_loss_percent = 2.0        # Cut short losses at 2%
